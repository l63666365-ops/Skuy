<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Background rounded square navy -->
  <rect width="512" height="512" rx="115" fill="#0f1e4a"/>

  <!-- Lingkaran jam besar (putih) -->
  <circle cx="220" cy="235" r="140" fill="none" stroke="#ffffff" stroke-width="22"/>

  <!-- Tanda 12, 3, 6, 9 -->
  <line x1="220" y1="110" x2="220" y2="135" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <line x1="220" y1="335" x2="220" y2="360" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <line x1="95"  y1="235" x2="120" y2="235" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <line x1="320" y1="235" x2="345" y2="235" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>

  <!-- Jarum jam (pendek) -->
  <line x1="220" y1="235" x2="220" y2="168" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <!-- Jarum menit (panjang, mengarah ke kanan-atas, sekitar jam 1) -->
  <line x1="220" y1="235" x2="280" y2="185" stroke="#f5a623" stroke-width="10" stroke-linecap="round"/>

  <!-- Titik tengah jam -->
  <circle cx="220" cy="235" r="12" fill="#f5a623"/>

  <!-- Garis-garis jadwal (kanan, simpel) -->
  <rect x="395" y="148" width="80" height="14" rx="7" fill="#ffffff" opacity="0.9"/>
  <rect x="395" y="186" width="60" height="14" rx="7" fill="#ffffff" opacity="0.6"/>
  <rect x="395" y="224" width="75" height="14" rx="7" fill="#f5a623" opacity="0.95"/>
  <rect x="395" y="262" width="55" height="14" rx="7" fill="#ffffff" opacity="0.6"/>
  <rect x="395" y="300" width="70" height="14" rx="7" fill="#ffffff" opacity="0.4"/>

  <!-- Titik bulat di depan garis jadwal -->
  <circle cx="383" cy="155" r="7" fill="#ffffff" opacity="0.9"/>
  <circle cx="383" cy="193" r="7" fill="#ffffff" opacity="0.6"/>
  <circle cx="383" cy="231" r="7" fill="#f5a623"/>
  <circle cx="383" cy="269" r="7" fill="#ffffff" opacity="0.6"/>
  <circle cx="383" cy="307" r="7" fill="#ffffff" opacity="0.4"/>

  <!-- Garis pemisah vertikal tipis -->
  <line x1="368" y1="130" x2="368" y2="325" stroke="#ffffff" stroke-width="2" opacity="0.2"/>

</svg>
